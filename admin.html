<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול אירועים — הצדף</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--gold:#B89A5A;--dark:#151923;--navy:#1e2a45;--navy2:#263352;--card:#1a2236;--card2:#202d44;--text:#e8eaf0;--muted:#8892a4;--border:rgba(184,154,90,.18);--green:#2ecc71;--orange:#f39c12;--red:#e74c3c;--blue:#3498db;--radius:10px}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Assistant,sans-serif;background:var(--dark);color:var(--text);direction:rtl;min-height:100vh}.header{background:var(--navy);border-bottom:2px solid var(--gold);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:20}.brand{display:flex;align-items:center;gap:14px}.logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}.title{font-size:22px;font-weight:800;color:var(--gold)}.sub{font-size:12px;color:var(--muted);margin-top:2px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{padding:8px 15px;border-radius:8px;border:0;cursor:pointer;font-family:Assistant,sans-serif;font-weight:700;font-size:14px;display:inline-flex;gap:6px;align-items:center;justify-content:center}.btn:disabled{opacity:.45;cursor:not-allowed}.btn-gold{background:linear-gradient(135deg,#c8a84b,#9a7f38);color:#fff}.btn-ghost{background:rgba(255,255,255,.07);color:var(--text);border:1px solid rgba(255,255,255,.12)}.btn-wa{background:rgba(37,211,102,.14);color:#52e58a;border:1px solid rgba(37,211,102,.35)}.btn-danger{background:rgba(231,76,60,.15);color:#ff8d7f;border:1px solid rgba(231,76,60,.3)}.btn-warn{background:rgba(243,156,18,.14);color:#ffc46b;border:1px solid rgba(243,156,18,.32)}.main{max-width:1400px;margin:0 auto;padding:18px 18px}.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-bottom:13px}.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;min-height:62px}.kpi-v{font-size:20px;line-height:1;font-weight:800;color:var(--gold)}.kpi-l{font-size:11px;color:var(--muted);margin-top:4px}.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}input,select,textarea{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:Assistant,sans-serif;font-size:14px;direction:rtl}input:focus,select:focus,textarea:focus{outline:0;border-color:var(--gold)}.search{flex:1;min-width:220px}.table-wrap,.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}table{width:100%;border-collapse:collapse}th{background:var(--navy2);padding:11px 14px;text-align:right;font-size:12px;color:var(--gold);white-space:nowrap}td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px;vertical-align:middle}tr{cursor:pointer}tr:hover{background:var(--card2)}tr.cancelled-row,.card.cancelled-row{opacity:.58}.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:800;white-space:nowrap}.waiting{background:rgba(243,156,18,.15);color:#f39c12;border:1px solid rgba(243,156,18,.3)}.received{background:rgba(52,152,219,.15);color:#3498db;border:1px solid rgba(52,152,219,.3)}.approved{background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3)}.cancelled{background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.2)}.received-at{font-size:11px;color:var(--gold);margin-top:3px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:15px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer}.card:hover{border-color:rgba(184,154,90,.5);transform:translateY(-1px)}.card-h{background:var(--navy2);padding:13px 16px;display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border)}.card-name{font-size:18px;font-weight:800}.card-meta{font-size:13px;color:var(--muted);margin-top:4px}.card-b{padding:13px 16px}.row{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}.row .label{color:var(--muted)}.row .value{font-weight:700;text-align:left}.price{color:var(--gold);font-weight:800}.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;padding:18px;align-items:flex-start;justify-content:center;overflow:auto}.modal-backdrop.open{display:flex}.modal{background:var(--navy);border:1px solid var(--border);border-radius:12px;max-width:900px;width:100%;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}.modal-h{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:12px}.modal-title{font-size:22px;color:var(--gold);font-weight:800}.close{width:34px;height:34px;border-radius:6px;background:rgba(255,255,255,.08);color:#fff;border:0;cursor:pointer}.modal-b{padding:20px 22px}.section{margin-bottom:18px}.section-title{font-size:12px;color:var(--gold);font-weight:800;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px}.fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}.field{background:var(--card);border-radius:8px;padding:10px 12px}.f-l{font-size:11px;color:var(--muted)}.f-v{font-size:14px;font-weight:700;white-space:pre-wrap}.edit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;width:100%}.modal-f{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center}.notes{width:100%;min-height:76px}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;transition:.25s;z-index:999;max-width:92vw}.toast.show{transform:translateX(-50%) translateY(0)}.muted{color:var(--muted);font-size:13px;line-height:1.6}.readonly-note{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.28);color:#ffb0a7;border-radius:8px;padding:10px 12px;width:100%;font-size:13px;font-weight:700}@media(max-width:768px){.header{padding:12px 14px;align-items:flex-start;flex-direction:column}.main{padding:14px 12px}.kpi{grid-template-columns:repeat(2,1fr);gap:8px}.kpi-card{padding:8px 10px;min-height:56px}.kpi-v{font-size:18px}th:nth-child(n+5),td:nth-child(n+5){display:none}.grid{grid-template-columns:1fr}.actions{width:100%}.btn{flex:1}.modal-f .btn{flex:1 1 42%}}
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <img class="logo" src="https://media.base44.com/images/public/6a01bc0bf7391ac07f7a853e/b2bf014df_aa7637b2-8d58-44c2-a4e9-91c7f3430ac8.jpg" alt="לוגו" onerror="this.style.display='none'" />
      <div><div class="title">הצדף — ניהול אירועים</div><div class="sub">לוח בקרה פנימי</div></div>
    </div>
    <div class="actions"><button class="btn btn-ghost" onclick="loadAll()">↺ רענון</button><button class="btn btn-gold" onclick="openAdd()">+ אירוע חדש</button></div>
  </div>

  <main class="main">
    <div class="kpi">
      <div class="kpi-card"><div class="kpi-v" id="kpiTotal">—</div><div class="kpi-l">אירועים פעילים</div></div>
      <div class="kpi-card"><div class="kpi-v" id="kpiWaiting">—</div><div class="kpi-l">ממתינים לתפריט</div></div>
      <div class="kpi-card"><div class="kpi-v" id="kpiApproved">—</div><div class="kpi-l">סגורים / מאושרים</div></div>
      <div class="kpi-card"><div class="kpi-v" id="kpiGuests">—</div><div class="kpi-l">מוזמנים החודש</div></div>
      <div class="kpi-card"><div class="kpi-v" id="kpiRevenue">—</div><div class="kpi-l">הכנסה חודשית</div></div>
    </div>

    <div class="toolbar">
      <input class="search" id="search" placeholder="חיפוש לפי שם, טלפון, סוג אירוע..." oninput="render()" />
      <select id="statusFilter" onchange="render()"><option value="">כל הסטטוסים</option><option>ממתין לתפריט</option><option>תפריט התקבל</option><option>סגור / מאושר</option><option>בוטל</option></select>
      <select id="periodFilter" onchange="render()"><option value="upcoming">אירועים קרובים</option><option value="all">כל האירועים</option><option value="past">אירועים שעברו</option><option value="month">החודש הנוכחי</option></select>
      <button id="tableBtn" class="btn btn-gold" onclick="setView('table')">☰ טבלה</button>
      <button id="cardBtn" class="btn btn-ghost" onclick="setView('cards')">⊞ כרטיסיות</button>
    </div>

    <div id="content" class="table-wrap"><div style="padding:50px;text-align:center;color:var(--muted)">טוען אירועים...</div></div>
  </main>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-h"><div><div class="modal-title" id="mTitle">—</div><div class="sub" id="mSub">—</div></div><button class="close" onclick="closeModal()">✕</button></div>
      <div class="modal-b" id="mBody"></div>
      <div class="modal-f">
        <div id="readonlyNote" class="readonly-note" style="display:none">אירוע זה בוטל ולכן אינו ניתן לעריכה. אפשר למחוק אותו לגמרי מהרשימה אם צריך.</div>
        <div class="edit-grid">
          <select id="mStatus"><option>ממתין לתפריט</option><option>תפריט התקבל</option><option>סגור / מאושר</option></select>
          <input id="mPrice" type="number" min="0" step="1" placeholder="מחיר לבוגר" oninput="recalcModalTotal()" />
          <input id="mTotal" type="number" min="0" step="1" placeholder="סה״כ כולל שירות" />
        </div>
        <textarea class="notes" id="mNotes" placeholder="הערות פנימיות"></textarea>
        <button class="btn btn-wa" id="waBtn" onclick="shareWhatsApp()">שלח סיכום בוואטסאפ</button>
        <button class="btn btn-ghost" id="summaryDocBtn" onclick="openCleanSummary()">פתח סיכום מסודר</button>
        <button class="btn btn-ghost" id="kitchenDocBtn" onclick="openKitchenSummary()">פתח סיכום מטבח</button>
        <button class="btn btn-warn" id="cancelBtn" onclick="cancelCurrent()">בטל אירוע</button>
        <button class="btn btn-danger" onclick="deleteCurrent()">מחק</button>
        <button class="btn btn-ghost" onclick="closeModal()">סגור</button>
        <button class="btn btn-gold" id="saveBtn" onclick="saveCurrent()">שמור</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="addModal">
    <div class="modal"><div class="modal-h"><div class="modal-title">+ אירוע חדש</div><button class="close" onclick="closeAdd()">✕</button></div>
      <div class="modal-b"><div class="fields"><input id="aName" placeholder="שם מלא *"><input id="aPhone" placeholder="טלפון *"><input id="aDate" type="date"><input id="aTime" type="time"><input id="aGuests" type="number" placeholder="מוזמנים"><input id="aKids" type="number" placeholder="ילדים" value="0"><select id="aType"><option value="">סוג אירוע</option><option>יום הולדת</option><option>בר/בת מצווה</option><option>אירוע חברה / עסקי</option><option>מסיבת סיום / פרישה</option><option>ארוחת חג</option><option>אחר</option></select><select id="aStatus"><option>ממתין לתפריט</option><option>תפריט התקבל</option><option>סגור / מאושר</option></select></div><textarea id="aNotes" style="width:100%;margin-top:10px;min-height:80px" placeholder="הערות"></textarea></div>
      <div class="modal-f"><button class="btn btn-ghost" onclick="closeAdd()">ביטול</button><button class="btn btn-gold" onclick="saveNew()">שמור אירוע</button></div></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxbARiwsxV4CpCcpTx6z0MMSWrUZvrcng-ByhNtiljb6-EGQIXwMzGe5jNvlIbf9F_N/exec';
const LS_EVENTS = 'zedef_admin_events_v1';
const LS_OVERRIDES = 'zedef_admin_overrides_v2';
let events = [];
let view = 'table';
let currentId = null;
const dayNames = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function today(){return new Date().toISOString().slice(0,10)}
function pad2(n){return String(n).padStart(2,'0')}
function formatDate(dateStr){if(!dateStr)return '—';if(/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr))){const [y,m,d]=String(dateStr).split('-');return `${d}.${m}.${y}`}const dt=new Date(dateStr);if(isNaN(dt))return String(dateStr);return `${pad2(dt.getDate())}.${pad2(dt.getMonth()+1)}.${dt.getFullYear()}`}
function formatDateTime(value){if(!value)return '—';let s=String(value).trim();let dt;if(/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}/.test(s)){const [date,time]=s.split(' ');const [y,m,d]=date.split('-').map(Number);const [hh,mm]=time.split(':').map(Number);dt=new Date(y,m-1,d,hh,mm)}else if(/^\d{4}-\d{2}-\d{2}T/.test(s)){dt=new Date(s)}else{dt=new Date(s)}if(isNaN(dt))return s;return `${pad2(dt.getDate())}.${pad2(dt.getMonth()+1)}.${dt.getFullYear()} ${pad2(dt.getHours())}:${pad2(dt.getMinutes())}`}
function fmt(n){return '₪' + Math.round(Number(n)||0).toLocaleString('he-IL')}
function joinVal(v){return Array.isArray(v)?v.join(' • '):(v||'')}
function bool(v){return v===true||v==='true'||v==='yes'||v==='כן'||v===1}
function cleanListText(v){return (v||'—').toString().replace(/\s*•\s*/g, ', ')}
function endpointReady(){return APPS_SCRIPT_ENDPOINT && !APPS_SCRIPT_ENDPOINT.includes('PASTE_YOUR_WEB_APP_URL_HERE') && APPS_SCRIPT_ENDPOINT.includes('/exec')}

function calc(data){const date=data.event_date||'';let dow=0;if(date){let [y,m,d]=date.split('-').map(Number);dow=new Date(y,m-1,d).getDay()}const weekend=dow===5||dow===6;const baseAdult=weekend?310:265;const baseKid=weekend?220:180;const wine=bool(data.wine_option);const inter=bool(data.inter_option);const price=baseAdult+(wine?30:0)+(inter?40:0);const guests=Number(data.guest_count)||0;const kids=Number(data.kids_count)||0;const adults=Math.max(guests-kids,0);return{event_day:date?'יום '+dayNames[dow]:'',pricing_type:weekend?'שישי–שבת':'ראשון–חמישי',price_per_person:price,total_estimated:Math.round(((adults*price)+(kids*baseKid))*1.15),baseKid}}
function normalize(data){const c=calc(data);const eq=Array.isArray(data.equipment)?data.equipment:[];const id=data.github_submission_id||data.id||('local-'+Date.now()+'-'+Math.random().toString(36).slice(2,7));return{id,full_name:data.full_name||data.fullName||'',phone:data.phone||'',email:data.email||'',company:data.company||'',event_date:data.event_date||data.eventDate||'',event_day:data.event_day||c.event_day,event_time:data.event_time||data.eventTime||'',guest_count:Number(data.guest_count||data.guestCount)||0,kids_count:Number(data.kids_count||data.kidsCount)||0,event_type:data.event_type||data.eventType||'',seating_style:data.seating_style||data.seatingStyle||'',status:data.status||'תפריט התקבל',pricing_type:data.pricing_type||c.pricing_type,price_per_person:Number(data.price_per_person)||c.price_per_person,total_estimated:Number(data.total_estimated)||c.total_estimated,has_projector:bool(data.has_projector)||eq.includes('מקרן'),has_microphone:bool(data.has_microphone)||eq.includes('מיקרופון'),has_gifts_table:bool(data.has_gifts_table)||eq.includes('שולחן מתנות'),has_music:bool(data.has_music)||eq.includes('מוזיקה'),wine_option:bool(data.wine_option),inter_option:bool(data.inter_option),salads:joinVal(data.salads),inter_dishes:joinVal(data.inter_dishes),main_dishes:joinVal(data.main_dishes),side_dishes:joinVal(data.side_dishes),diet_notes:joinVal(data.diet_flags||data.diet_notes),allergies:data.allergies||'',notes:data.notes||'',internal_notes:data.internal_notes||'',source:data.source||'github-menu-form',github_submission_id:id,submitted_at:data.submitted_at||'',raw_form_payload:data.raw_form_payload||data,email_body:data.email_body||''}}
function loadLocal(){return JSON.parse(localStorage.getItem(LS_EVENTS)||'[]')}
function saveLocal(list){localStorage.setItem(LS_EVENTS,JSON.stringify(list))}
function overrides(){return JSON.parse(localStorage.getItem(LS_OVERRIDES)||'{}')}
function saveOverrides(o){localStorage.setItem(LS_OVERRIDES,JSON.stringify(o))}
function mergeOverrides(list){const o=overrides();return list.map(e=>Object.assign(e,o[e.id]||{}))}

function fetchJsonp(url){return new Promise((res,rej)=>{const cb='jsonp_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');let done=false;window[cb]=d=>{done=true;delete window[cb];s.remove();res(d)};s.onerror=()=>{if(done)return;delete window[cb];s.remove();rej(new Error('טעינת נתונים נכשלה'))};s.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&action=list&_='+Date.now();document.body.appendChild(s);setTimeout(()=>{if(done)return;delete window[cb];s.remove();rej(new Error('שרת הנתונים לא הגיב'))},15000)})}
async function apiPost(payload){if(!endpointReady())throw new Error('חסר APPS_SCRIPT_ENDPOINT תקין בקובץ admin.html');const r=await fetch(APPS_SCRIPT_ENDPOINT,{method:'POST',mode:'cors',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});const txt=await r.text();let data;try{data=JSON.parse(txt)}catch(e){throw new Error('שרת הנתונים החזיר תשובה לא תקינה')}if(!r.ok||data.ok===false)throw new Error(data.error||'הפעולה נכשלה');return data.data||data}

async function loadAll(){let remote=[];try{if(endpointReady()){const d=await fetchJsonp(APPS_SCRIPT_ENDPOINT);remote=(d.data||d.events||d||[]).map(normalize)}else{toast('חסר endpoint תקין — נטען מקומית בלבד')}}catch(e){toast('נטען מקומית בלבד: '+e.message)}const local=loadLocal().map(normalize);const map=new Map();[...remote,...local].forEach(e=>map.set(e.id,e));events=sortEvents(mergeOverrides([...map.values()]));updateKpis();render()}
function sortEvents(list){return list.slice().sort((a,b)=>{const da=(a.event_date||'9999-12-31')+' '+(a.event_time||'99:99');const db=(b.event_date||'9999-12-31')+' '+(b.event_time||'99:99');return da.localeCompare(db)})}
function filtered(){const s=document.getElementById('search').value.trim().toLowerCase();const st=document.getElementById('statusFilter').value;const p=document.getElementById('periodFilter').value;const t=today();return sortEvents(events.filter(e=>{if(st&&e.status!==st)return false;if(p==='upcoming'&&(!e.event_date||e.event_date<t))return false;if(p==='past'&&(!e.event_date||e.event_date>=t))return false;if(p==='month'){const n=new Date(),ms=new Date(n.getFullYear(),n.getMonth(),1).toISOString().slice(0,10),me=new Date(n.getFullYear(),n.getMonth()+1,0).toISOString().slice(0,10);if(!e.event_date||e.event_date<ms||e.event_date>me)return false}if(s){const hay=[e.full_name,e.phone,e.event_type,e.company,e.email].join(' ').toLowerCase();if(!hay.includes(s))return false}return true}))}
function updateKpis(){const t=today();const n=new Date(),ms=new Date(n.getFullYear(),n.getMonth(),1).toISOString().slice(0,10),me=new Date(n.getFullYear(),n.getMonth()+1,0).toISOString().slice(0,10);const active=events.filter(e=>e.status!=='בוטל'&&e.event_date>=t);const month=events.filter(e=>e.status!=='בוטל'&&e.event_date>=ms&&e.event_date<=me);document.getElementById('kpiTotal').textContent=active.length;document.getElementById('kpiWaiting').textContent=events.filter(e=>e.status==='ממתין לתפריט'&&e.event_date>=t).length;document.getElementById('kpiApproved').textContent=events.filter(e=>e.status==='סגור / מאושר'&&e.event_date>=t).length;document.getElementById('kpiGuests').textContent=month.reduce((s,e)=>s+(Number(e.guest_count)||0),0).toLocaleString('he-IL');document.getElementById('kpiRevenue').textContent=fmt(month.reduce((s,e)=>s+(Number(e.total_estimated)||0),0))}
function statusBadge(s){const cls={'ממתין לתפריט':'waiting','תפריט התקבל':'received','סגור / מאושר':'approved','בוטל':'cancelled'}[s]||'waiting';return `<span class="badge ${cls}">${s||'—'}</span>`}
function receivedAt(e){return e.submitted_at?`<div class="received-at">נקלט במערכת • ${formatDateTime(e.submitted_at)}</div>`:''}
function equip(e){return [e.has_projector?'🎥':'',e.has_microphone?'🎤':'',e.has_gifts_table?'🎁':'',e.has_music?'🎵':''].filter(Boolean).join(' ')||'—'}
function render(){const list=filtered();const c=document.getElementById('content');if(!list.length){c.className='table-wrap';c.innerHTML='<div style="text-align:center;padding:45px;color:var(--muted)">📭 לא נמצאו אירועים</div>';return}if(view==='table'){c.className='table-wrap';c.innerHTML='<table><thead><tr><th>תאריך</th><th>איש קשר</th><th>סוג</th><th>מוזמנים</th><th>סטטוס</th><th>ציוד</th><th>הכנסה</th></tr></thead><tbody>'+list.map(e=>`<tr class="${e.status==='בוטל'?'cancelled-row':''}" onclick="openEvent('${e.id}')"><td><b>${formatDate(e.event_date)}</b><div class="sub">${e.event_day||''} ${e.event_time||''}</div></td><td><b>${e.full_name||'—'}</b><div class="sub">${e.phone||''}</div>${receivedAt(e)}</td><td>${e.event_type||'—'}</td><td><b>${e.guest_count||0}</b></td><td>${statusBadge(e.status)}</td><td>${equip(e)}</td><td class="price">${fmt(e.total_estimated)}</td></tr>`).join('')+'</tbody></table>'}else{c.className='grid';c.innerHTML=list.map(e=>`<div class="card ${e.status==='בוטל'?'cancelled-row':''}" onclick="openEvent('${e.id}')"><div class="card-h"><div><div class="card-name">${e.full_name||'—'}</div><div class="card-meta">${formatDate(e.event_date)} • ${e.event_time||''} • ${e.event_type||'אירוע'}</div>${receivedAt(e)}</div>${statusBadge(e.status)}</div><div class="card-b"><div class="row"><span class="label">טלפון</span><span class="value">${e.phone||'—'}</span></div><div class="row"><span class="label">מוזמנים</span><span class="value">${e.guest_count||0} כולל ${e.kids_count||0} ילדים</span></div><div class="row"><span class="label">ציוד</span><span class="value">${equip(e)}</span></div><div class="row"><span class="label">הכנסה</span><span class="value price">${fmt(e.total_estimated)}</span></div></div></div>`).join('')}}
function setView(v){view=v;document.getElementById('tableBtn').classList.toggle('btn-gold',v==='table');document.getElementById('tableBtn').classList.toggle('btn-ghost',v!=='table');document.getElementById('cardBtn').classList.toggle('btn-gold',v==='cards');document.getElementById('cardBtn').classList.toggle('btn-ghost',v!=='cards');render()}
function field(l,v){return `<div class="field"><div class="f-l">${l}</div><div class="f-v">${v||'—'}</div></div>`}
function section(t,html){return `<div class="section"><div class="section-title">${t}</div><div class="fields">${html}</div></div>`}
function openEvent(id){const e=events.find(x=>x.id===id);if(!e)return;currentId=id;const cancelled=e.status==='בוטל';document.getElementById('mTitle').textContent=e.full_name||'—';document.getElementById('mSub').textContent=[e.event_type,formatDate(e.event_date),e.event_day,e.event_time].filter(Boolean).join(' • ');document.getElementById('mStatus').value=cancelled?'תפריט התקבל':(e.status||'תפריט התקבל');document.getElementById('mNotes').value=e.internal_notes||'';document.getElementById('mPrice').value=Math.round(Number(e.price_per_person)||0)||'';document.getElementById('mTotal').value=Math.round(Number(e.total_estimated)||0)||'';document.getElementById('mBody').innerHTML=section('פרטי אירוע',field('שם',e.full_name)+field('טלפון',e.phone)+field('אימייל',e.email)+field('חברה',e.company)+field('תאריך',`${formatDate(e.event_date)} ${e.event_day||''}`)+field('שעה',e.event_time)+field('מוזמנים',`${e.guest_count||0} כולל ${e.kids_count||0} ילדים`)+field('סטטוס',e.status)+field('נקלט במערכת',formatDateTime(e.submitted_at)))+section('מחיר וציוד',field('מחיר לבוגר',fmt(e.price_per_person))+field('סה״כ כולל שירות',fmt(e.total_estimated))+field('יין ובירה',e.wine_option?'כן':'לא')+field('מנות ביניים',e.inter_option?'כן':'לא')+field('ציוד',equip(e)))+section('תפריט שנבחר',field('סלטים',e.salads)+field('מנות ביניים',e.inter_dishes)+field('עיקריות',e.main_dishes)+field('תוספות',e.side_dishes))+section('דגשים והערות',field('תזונה',e.diet_notes)+field('אלרגיות',e.allergies)+field('הערות לקוח',e.notes));setModalReadonly(cancelled);document.getElementById('modal').classList.add('open')}
function setModalReadonly(isReadonly){document.getElementById('readonlyNote').style.display=isReadonly?'block':'none';['mStatus','mPrice','mTotal','mNotes','saveBtn','cancelBtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=isReadonly});document.getElementById('waBtn').disabled=false}
function recalcModalTotal(){if(!currentId)return;const e=events.find(x=>x.id===currentId);if(!e)return;const price=Number(document.getElementById('mPrice').value)||0;const kids=Number(e.kids_count)||0;const guests=Number(e.guest_count)||0;const adults=Math.max(guests-kids,0);const weekend=(e.pricing_type||'').includes('שישי')||['יום שישי','יום שבת'].includes(e.event_day);const baseKid=weekend?220:180;document.getElementById('mTotal').value=Math.round(((adults*price)+(kids*baseKid))*1.15)}

function esc(v){return String(v===undefined||v===null||v===''?'—':v).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function listItems(v){const txt=(v||'').toString().trim();if(!txt)return '<li>—</li>';return txt.split(/\s*•\s*|\s*,\s*/).map(x=>x.trim()).filter(Boolean).map(x=>'<li>'+esc(x)+'</li>').join('')||'<li>—</li>'}
function fileSafeName(e){return ('zedef-event-'+(e.full_name||'event')+'-'+(e.event_date||'')).replace(/[\\/:*?"<>|]+/g,'-').replace(/\s+/g,'-')}

function kitchenListRows(v){
  const txt=(v||'').toString().trim();
  const items=txt?txt.split(/\s*•\s*|\s*,\s*/).map(x=>x.trim()).filter(Boolean):[];
  if(!items.length)return '<tr><td class="dish muted-dish">—</td><td class="qty"><input class="qty-input" /></td></tr>';
  return items.map(x=>'<tr><td class="dish">'+esc(x)+'</td><td class="qty"><input class="qty-input" /></td></tr>').join('');
}

function shareWhatsApp(){if(!currentId)return;const e=events.find(x=>x.id===currentId);if(!e)return;window.open('https://wa.me/?text='+encodeURIComponent(buildWhatsAppSummary(e)),'_blank')}
function closeModal(){document.getElementById('modal').classList.remove('open');currentId=null}
async function saveCurrent(){if(!currentId)return;const payload={action:'updateEvent',id:currentId,status:document.getElementById('mStatus').value,internal_notes:document.getElementById('mNotes').value,price_per_person:Number(document.getElementById('mPrice').value)||0,total_estimated:Number(document.getElementById('mTotal').value)||0};try{await apiPost(payload);toast('נשמר בשיטס');closeModal();loadAll()}catch(err){const o=overrides();o[currentId]=Object.assign(o[currentId]||{},payload);delete o[currentId].action;saveOverrides(o);toast('נשמר מקומית בלבד: '+err.message);closeModal();loadAll()}}
async function cancelCurrent(){if(!currentId)return;const e=events.find(x=>x.id===currentId);if(!e)return;if(!confirm(`לבטל את האירוע של ${e.full_name || '?'}? האירוע יישאר ברשימה אבל לא יהיה ניתן לעריכה.`))return;try{await apiPost({action:'updateEvent',id:currentId,status:'בוטל',internal_notes:document.getElementById('mNotes').value});toast('האירוע בוטל');closeModal();loadAll()}catch(err){const o=overrides();o[currentId]=Object.assign(o[currentId]||{},{status:'בוטל',internal_notes:document.getElementById('mNotes').value});saveOverrides(o);toast('בוטל מקומית בלבד: '+err.message);closeModal();loadAll()}}
async function deleteCurrent(){if(!currentId)return;const e=events.find(x=>x.id===currentId);if(!e)return;if(!confirm(`למחוק לגמרי את האירוע של ${e.full_name || '?'}? הפעולה תסיר אותו מהרשימה ומהשיטס.`))return;try{await apiPost({action:'deleteEvent',id:currentId});toast('האירוע נמחק');closeModal();loadAll()}catch(err){saveLocal(loadLocal().filter(x=>x.id!==currentId));const o=overrides();o[currentId]={_deleted:true};saveOverrides(o);events=events.filter(x=>x.id!==currentId);toast('נמחק מקומית בלבד: '+err.message);closeModal();render();updateKpis()}}
function openAdd(){document.getElementById('addModal').classList.add('open')}function closeAdd(){document.getElementById('addModal').classList.remove('open')}
function saveNew(){const d={full_name:document.getElementById('aName').value,phone:document.getElementById('aPhone').value,event_date:document.getElementById('aDate').value,event_time:document.getElementById('aTime').value,guest_count:Number(document.getElementById('aGuests').value)||0,kids_count:Number(document.getElementById('aKids').value)||0,event_type:document.getElementById('aType').value,status:document.getElementById('aStatus').value,notes:document.getElementById('aNotes').value,source:'manual',send_email:false};if(!d.full_name||!d.phone||!d.event_date){toast('חסר שם, טלפון או תאריך');return}const ev=normalize(d);ev.status=d.status;ev.source='manual';const local=loadLocal();local.push(ev);saveLocal(local);closeAdd();loadAll();toast('אירוע נוסף מקומית')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}
['modal','addModal'].forEach(id=>document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')}));
setView('table');loadAll();
</script>
